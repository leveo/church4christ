<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 560" font-family="system-ui, sans-serif" role="img" aria-label="People and households: a household groups adults with accounts and name-only child dependents; every member has a status on the visitor-to-member journey with admin-only pastoral notes; members find serving through the opportunity board and apply to a team, while leaders reach out first with a logged invite email">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#565B6B"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="820" height="560" fill="#F7F5F0"/>
  <text x="30" y="42" font-size="22" font-weight="700" fill="#232630">People &amp; households: profiles, families, and the way in to serving</text>

  <!-- Left card: a household groups people -->
  <rect x="30" y="72" width="350" height="214" rx="10" fill="#FFFFFF" stroke="#DDD9CF"/>
  <path d="M40,72 H370 Q380,72 380,82 V106 H30 V82 Q30,72 40,72 Z" fill="#31487A"/>
  <text x="46" y="94" font-size="14" font-weight="700" fill="#FFFFFF">A household groups people</text>

  <text x="46" y="130" font-size="14" font-weight="700" fill="#232630">Chen Family &#38472;&#23478;</text>

  <!-- member row 1: adult, primary, has account -->
  <text x="46" y="153" font-size="13" fill="#232630">David Chen</text>
  <rect x="140" y="141" width="46" height="17" rx="8" fill="#F7F5F0" stroke="#DDD9CF"/>
  <text x="163" y="153" font-size="11" fill="#565B6B" text-anchor="middle">Adult</text>
  <rect x="192" y="141" width="58" height="17" rx="8" fill="#31487A"/>
  <text x="221" y="153" font-size="11" fill="#FFFFFF" text-anchor="middle">Primary</text>
  <text x="260" y="153" font-size="11" fill="#565B6B">has account</text>

  <!-- member row 2: adult, has account -->
  <text x="46" y="183" font-size="13" fill="#232630">Amy Chen</text>
  <rect x="140" y="171" width="46" height="17" rx="8" fill="#F7F5F0" stroke="#DDD9CF"/>
  <text x="163" y="183" font-size="11" fill="#565B6B" text-anchor="middle">Adult</text>
  <text x="200" y="183" font-size="11" fill="#565B6B">has account</text>

  <!-- member row 3: child, name-only -->
  <text x="46" y="213" font-size="13" fill="#232630">Ethan Chen</text>
  <rect x="140" y="201" width="44" height="17" rx="8" fill="#F7F5F0" stroke="#DDD9CF"/>
  <text x="162" y="213" font-size="11" fill="#565B6B" text-anchor="middle">Child</text>
  <text x="196" y="213" font-size="11" fill="#565B6B">name only &#183; no login</text>

  <text x="46" y="246" font-size="12" fill="#565B6B">Children are name-only rows &#8212; hidden from</text>
  <text x="46" y="264" font-size="12" fill="#565B6B">public and leader pages; admin and own household only.</text>

  <!-- Right card: the membership journey -->
  <rect x="440" y="72" width="350" height="214" rx="10" fill="#FFFFFF" stroke="#DDD9CF"/>
  <path d="M450,72 H780 Q790,72 790,82 V106 H440 V82 Q440,72 450,72 Z" fill="#31487A"/>
  <text x="456" y="94" font-size="14" font-weight="700" fill="#FFFFFF">The membership journey</text>

  <rect x="456" y="122" width="170" height="28" rx="8" fill="#F7F5F0" stroke="#DDD9CF"/>
  <text x="470" y="140" font-size="13" fill="#232630">Visitor</text>
  <line x1="490" y1="150" x2="490" y2="160" stroke="#565B6B" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="456" y="160" width="170" height="28" rx="8" fill="#F7F5F0" stroke="#DDD9CF"/>
  <text x="470" y="178" font-size="13" fill="#232630">Regular attender</text>
  <line x1="490" y1="188" x2="490" y2="198" stroke="#565B6B" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="456" y="198" width="170" height="28" rx="8" fill="#2F7A4D"/>
  <text x="470" y="216" font-size="13" font-weight="700" fill="#FFFFFF">Member</text>

  <line x1="626" y1="176" x2="662" y2="200" stroke="#565B6B" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="700" y="164" font-size="11" fill="#565B6B" text-anchor="middle">drifts away</text>
  <rect x="654" y="204" width="120" height="28" rx="8" fill="#F7F5F0" stroke="#DDD9CF"/>
  <text x="714" y="222" font-size="13" fill="#565B6B" text-anchor="middle">Inactive</text>

  <text x="456" y="256" font-size="12" fill="#565B6B">Admin sets the status &#8212; never self-service.</text>
  <text x="456" y="274" font-size="12" fill="#565B6B">Pastoral notes stay admin-only; leaders never see them.</text>

  <!-- Bottom section: two ways members connect to serving -->
  <text x="30" y="318" font-size="15" font-weight="700" fill="#232630">Two ways members connect to serving</text>

  <text x="30" y="344" font-size="12" font-weight="600" fill="#565B6B">Members find their own way in</text>

  <rect x="30" y="352" width="150" height="58" rx="8" fill="#FFFFFF" stroke="#DDD9CF"/>
  <text x="105" y="378" font-size="13" font-weight="700" fill="#232630" text-anchor="middle">Member</text>
  <text x="105" y="396" font-size="11" fill="#565B6B" text-anchor="middle">signed in</text>

  <line x1="180" y1="381" x2="210" y2="381" stroke="#565B6B" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="195" y="373" font-size="10" fill="#565B6B" text-anchor="middle">browse</text>

  <rect x="210" y="352" width="150" height="58" rx="8" fill="#31487A"/>
  <text x="285" y="378" font-size="13" font-weight="700" fill="#FFFFFF" text-anchor="middle">Opportunity board</text>
  <text x="285" y="396" font-size="11" fill="#DDD9CF" text-anchor="middle">/serve/opportunities</text>

  <line x1="360" y1="381" x2="390" y2="381" stroke="#565B6B" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="375" y="373" font-size="10" fill="#565B6B" text-anchor="middle">apply</text>

  <rect x="390" y="352" width="150" height="58" rx="8" fill="#FFFFFF" stroke="#DDD9CF"/>
  <text x="465" y="378" font-size="13" font-weight="700" fill="#232630" text-anchor="middle">Application</text>
  <text x="465" y="396" font-size="11" fill="#565B6B" text-anchor="middle">to a team</text>

  <line x1="540" y1="381" x2="570" y2="381" stroke="#565B6B" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="555" y="373" font-size="10" fill="#565B6B" text-anchor="middle">review</text>

  <rect x="570" y="352" width="150" height="58" rx="8" fill="#FFFFFF" stroke="#DDD9CF"/>
  <text x="645" y="378" font-size="13" font-weight="700" fill="#232630" text-anchor="middle">Leader</text>
  <text x="645" y="396" font-size="11" fill="#565B6B" text-anchor="middle">reviews, welcomes</text>

  <text x="30" y="438" font-size="12" font-weight="600" fill="#565B6B">Leaders reach out first</text>

  <rect x="30" y="446" width="200" height="52" rx="8" fill="#FFFFFF" stroke="#DDD9CF"/>
  <text x="130" y="477" font-size="13" font-weight="700" fill="#232630" text-anchor="middle">Leader or admin</text>

  <line x1="230" y1="472" x2="560" y2="472" stroke="#565B6B" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="395" y="464" font-size="11" fill="#565B6B" text-anchor="middle">&#8220;Invite to serve&#8221; &#8212; a logged email</text>

  <rect x="560" y="446" width="160" height="52" rx="8" fill="#FFFFFF" stroke="#DDD9CF"/>
  <text x="640" y="477" font-size="13" font-weight="700" fill="#232630" text-anchor="middle">Member</text>

  <text x="30" y="530" font-size="12" fill="#565B6B">The board is open to everyone; the invite is a warm nudge &#8212; neither is required to belong.</text>
</svg>
