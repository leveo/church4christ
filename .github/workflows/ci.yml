name: CI

# Continuous integration for the open-source demo: install, build, and run the
# full test suite (unit + type-check + smoke + end-to-end). It never deploys and
# needs no secrets — anyone can fork this repo and get a green build.
#
# Deployment is intentionally NOT automated here. Keep your Cloudflare
# credentials out of this public repo: deploy your own instance manually with
# `npm run deploy` (or from a separate private repo). See docs/deploy.md.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    # Postgres for the Supabase-backend test layer (the pg vitest project + the
    # Postgres-backed e2e). The D1 steps never touch it; the pg suites self-skip
    # when DATABASE_URL is unset, so this service is the only thing that turns
    # them on in CI.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Cloudflare Worker types
        run: npx wrangler types

      - name: Prepare test reports
        run: >-
          node -e "require('node:fs').mkdirSync('.tmp', { recursive: true })"

      - name: Check generated capability documentation
        run: npm run docs:check

      - name: Prove setup dry-run and clean D1 install
        run: npx vitest run --project node test/setup/dry-run.test.ts test/setup/clean-room-d1.test.ts

      - name: Prove clean Supabase setup
        run: npx vitest run --project node test/setup/clean-room-pg.test.ts --reporter=json --outputFile=.tmp/setup-pg.json
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/postgres

      - name: Assert Supabase setup test did not skip
        run: node scripts/ci/assert-vitest-json.mjs .tmp/setup-pg.json 1

      - name: Build design tokens
        run: npm run tokens

      - name: Check token contrast + no hardcoded values
        run: npm run tokens:check

      - name: Run tests (node + workers projects)
        run: npm test

      - name: Type check
        run: npm run check

      - name: Build
        run: npm run build

      # The smoke test drives a real preview server, so its local D1 needs the
      # schema and the demo data — the same two commands from the quickstart.
      - name: Apply D1 migrations (local)
        run: npm run db:migrate:local

      - name: Seed demo data (local)
        run: npm run db:seed:local

      - name: Seed local media objects
        run: npm run db:seed-media:local

      - name: Smoke test
        run: bash scripts/smoke.sh

      - name: End-to-end tests (built worker)
        run: npm run test:e2e

      # ── Supabase (Postgres) backend ─────────────────────────────────────────
      # Re-prove the data layer against Postgres using the service container
      # above. The migrate + seed scripts read SUPABASE_DB_URL; the vitest pg
      # project and the Postgres e2e read DATABASE_URL. The URL is the service's
      # mapped port on localhost.
      - name: Apply Supabase migrations (Postgres)
        run: npm run db:migrate:supabase
        env:
          SUPABASE_DB_URL: postgres://postgres:postgres@localhost:5432/postgres

      - name: Seed demo data (Postgres)
        run: npm run db:seed:supabase
        env:
          SUPABASE_DB_URL: postgres://postgres:postgres@localhost:5432/postgres

      - name: Postgres backend tests (pg project)
        run: npx vitest run --project pg --reporter=json --outputFile=.tmp/pg.json
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/postgres

      - name: Assert Postgres project did not skip
        run: node scripts/ci/assert-vitest-json.mjs .tmp/pg.json 1

      - name: End-to-end tests (Postgres worker)
        run: npm run test:e2e:pg
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/postgres
